<section id="educacion" class="relative overflow-hidden rounded-[2.5rem] border border-white/40 bg-[linear-gradient(170deg,rgba(236,232,240,0.6)_0%,rgba(223,215,232,0.4)_100%)] p-[clamp(1.5rem,5vw,3rem)] backdrop-blur-sm shadow-xl">
  
  <div class="absolute -left-10 -top-10 h-40 w-40 rounded-full bg-midnight-orchid/10 blur-[80px]"></div>

  <div class="relative z-10">
    <p class="mb-2 text-[0.7rem] font-bold uppercase tracking-[0.3em] text-midnight-orchid opacity-80">
      Formación
    </p>
    <h2 class="mb-10 font-[var(--font-heading)] text-[clamp(1.8rem,3vw,2.3rem)] font-black tracking-tight text-[#2d2a4a]">
      Educación y certificaciones
    </h2>

    <div class="relative grid gap-6 border-l-2 border-midnight-orchid/20 ml-3 pl-8 sm:ml-4">
      @for (item of education(); track item.school + item.title) {
        <article class="group relative flex h-full flex-col rounded-[1.8rem] border border-white/50 bg-white/40 px-6 py-5 backdrop-blur-md shadow-lg transition-all duration-500 hover:-translate-y-1 hover:bg-white/70 hover:shadow-midnight-orchid/10">
          
          <span class="absolute -left-[2.55rem] top-7 h-4 w-4 rounded-full border-4 border-white bg-midnight-orchid shadow-[0_0_10px_rgba(109,40,217,0.4)] transition-transform group-hover:scale-125"></span>
          
          <p class="m-0 text-[0.65rem] font-black uppercase tracking-[0.2em] text-midnight-orchid/70">
            {{ item.year }}
          </p>
          
          <h3 class="m-0 mt-2 text-[1.1rem] font-extrabold leading-snug text-[#2d2a4a] group-hover:text-midnight-orchid transition-colors">
            {{ item.title }}
          </h3>
          
          <p class="m-0 mt-2 text-sm font-bold text-slate-500/90">
            {{ item.school }}
          </p>
        </article>
      }
    </div>

    <div class="mt-12 rounded-[2rem] border border-white/50 bg-white/30 p-6 backdrop-blur-md shadow-inner">
      <h3 class="mb-4 flex items-center gap-2 text-[0.7rem] font-bold uppercase tracking-[0.2em] text-midnight-orchid">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Idiomas
      </h3>

      <div class="flex flex-wrap gap-3">
        @for (language of languages(); track language.name) {
          <span class="group flex items-center gap-3 rounded-full border border-white/50 bg-white/60 px-4 py-2 text-sm font-bold text-[#2d2a4a] shadow-sm transition-all duration-300 hover:border-midnight-orchid/30 hover:bg-white">
            <div class="relative h-5 w-7 overflow-hidden rounded-sm shadow-sm transition-transform group-hover:scale-110">
               <img
                [src]="language.flagImage"
                [alt]="'Bandera de ' + language.name"
                class="h-full w-full object-cover"
                loading="lazy"
              />
            </div>
            <span>{{ language.name }} <span class="text-midnight-orchid/60 ml-1">·</span> {{ language.level }}</span>
          </span>
        }
      </div>
    </div>
  </div>
</section>
