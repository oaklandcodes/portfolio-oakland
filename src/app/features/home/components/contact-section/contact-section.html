<section id="contacto" class="mt-1.5 rounded-2xl border border-[var(--color-border)] bg-[var(--color-surface)] p-5 sm:p-7">
  <p class="mb-2 text-xs uppercase tracking-[0.08em] text-[var(--color-text-soft)]">
    Contacto
  </p>
  <h2 class="mb-2 font-[var(--font-heading)] text-[clamp(1.2rem,2.4vw,1.75rem)] text-[var(--color-text)]">
    Construyamos algo con impacto
  </h2>
  <p class="m-0 text-[var(--color-text-soft)]">
    Disponible para colaborar en proyectos frontend con Angular, arquitectura modular y mejora continua.
  </p>

  <div class="mt-5 grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
    @if (contacts().phone) {
      <a
        class="flex items-center gap-2 rounded-xl border border-[var(--color-border)] bg-white/35 px-4 py-3 text-sm text-[var(--color-text)] no-underline transition hover:bg-white/55"
        [href]="'tel:' + contacts().phone"
        aria-label="Llamar por telefono"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true" class="h-4 w-4 fill-current">
          <path d="M6.6 10.8a15.3 15.3 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.24 11.2 11.2 0 0 0 3.5.56 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.1a1 1 0 0 1 1 1 11.2 11.2 0 0 0 .56 3.5 1 1 0 0 1-.24 1z" />
        </svg>
        <span>Telefono</span>
      </a>
    }

    <a
      class="flex items-center gap-2 rounded-xl border border-[var(--color-border)] bg-white/35 px-4 py-3 text-sm text-[var(--color-text)] no-underline transition hover:bg-white/55"
      [href]="'mailto:' + contacts().email"
      [attr.aria-label]="'Enviar correo a ' + contacts().email"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true" class="h-4 w-4 fill-current">
        <path d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2zm0 2v.01L12 12l8-4.99V7H4z" />
      </svg>
      <span>Email</span>
    </a>

    <a
      class="flex items-center gap-2 rounded-xl border border-[var(--color-border)] bg-white/35 px-4 py-3 text-sm text-[var(--color-text)] no-underline transition hover:bg-white/55"
      [href]="contacts().linkedin"
      rel="noreferrer"
      target="_blank"
      aria-label="Abrir perfil de LinkedIn en una nueva pestaña"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true" class="h-4 w-4 fill-current">
        <path d="M6.94 8.5a1.56 1.56 0 1 1 0-3.12 1.56 1.56 0 0 1 0 3.12zM5.5 9.75h2.88V19H5.5zM10.2 9.75h2.76v1.27h.04c.38-.73 1.32-1.5 2.72-1.5 2.9 0 3.44 1.9 3.44 4.37V19h-2.88v-4.53c0-1.08-.02-2.46-1.5-2.46-1.5 0-1.73 1.17-1.73 2.38V19H10.2z" />
      </svg>
      <span>LinkedIn</span>
    </a>

    <a
      class="flex items-center gap-2 rounded-xl border border-[var(--color-border)] bg-white/35 px-4 py-3 text-sm text-[var(--color-text)] no-underline transition hover:bg-white/55"
      [href]="contacts().github"
      rel="noreferrer"
      target="_blank"
      aria-label="Abrir perfil de GitHub en una nueva pestaña"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true" class="h-4 w-4 fill-current">
        <path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.18-3.37-1.18-.45-1.16-1.1-1.47-1.1-1.47-.9-.62.07-.61.07-.61 1 .07 1.52 1.02 1.52 1.02.88 1.52 2.32 1.08 2.89.83.09-.64.35-1.08.63-1.33-2.22-.25-4.56-1.11-4.56-4.95 0-1.1.39-2 1.03-2.7-.1-.25-.45-1.28.1-2.66 0 0 .84-.27 2.75 1.03a9.45 9.45 0 0 1 5 0c1.9-1.3 2.74-1.03 2.74-1.03.56 1.38.21 2.41.1 2.66.64.7 1.03 1.6 1.03 2.7 0 3.85-2.34 4.7-4.57 4.95.36.31.68.93.68 1.88v2.78c0 .27.18.58.69.48A10 10 0 0 0 12 2z" />
      </svg>
      <span>GitHub</span>
    </a>
  </div>
</section>
