<section id="contacto" class="relative overflow-hidden rounded-[2.5rem] border border-white/40 bg-white/10 p-[clamp(1.5rem,5vw,3rem)] backdrop-blur-sm shadow-xl">
  
  <div class="absolute -right-20 -bottom-20 h-64 w-64 rounded-full bg-midnight-orchid/10 blur-[100px]"></div>

  <div class="relative z-10">
    <div class="mb-10">
      <p class="mb-2 text-[0.7rem] font-bold uppercase tracking-[0.3em] text-midnight-orchid opacity-80">
        Contacto
      </p>
      <h2 class="font-[var(--font-heading)] text-[clamp(1.8rem,3vw,2.3rem)] font-black tracking-tight text-[#2d2a4a]">
        Construyamos algo con impacto
      </h2>
      <p class="mt-4 m-0 max-w-[60ch] text-[1.05rem] font-medium leading-relaxed text-slate-600/90">
        Disponible para colaborar en proyectos frontend con <span class="text-midnight-orchid font-bold">Angular</span>, arquitectura modular y mejora continua.
      </p>
    </div>

    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      
      <a
        class="group flex items-center gap-4 rounded-[1.8rem] border border-white/50 bg-white/40 px-6 py-5 no-underline transition-all duration-300 hover:-translate-y-1 hover:bg-white/60 hover:shadow-xl hover:shadow-midnight-orchid/10"
        [href]="'mailto:' + contacts().email"
        [attr.aria-label]="'Enviar correo a ' + contacts().email"
      >
        <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-midnight-orchid/10 text-midnight-orchid shadow-inner transition-transform group-hover:scale-110">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3 7a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-10z" /><path d="M3 7l9 6l9 -6" /></svg>
        </div>
        <div class="flex flex-col">
          <span class="text-[0.65rem] font-bold uppercase tracking-widest text-slate-500">Escríbeme</span>
          <span class="text-[0.95rem] font-bold text-[#2d2a4a]">Email</span>
        </div>
      </a>

      <a
        class="group flex items-center gap-4 rounded-[1.8rem] border border-white/50 bg-white/40 px-6 py-5 no-underline transition-all duration-300 hover:-translate-y-1 hover:bg-white/60 hover:shadow-xl hover:shadow-midnight-orchid/10"
        [href]="contacts().linkedin"
        rel="noreferrer"
        target="_blank"
        aria-label="Abrir perfil de LinkedIn en una nueva pestaña"
      >
        <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-midnight-orchid/10 text-midnight-orchid shadow-inner transition-transform group-hover:scale-110">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z" /><path d="M8 11l0 5" /><path d="M8 8l0 .01" /><path d="M12 16l0 -5" /><path d="M16 16v-3a2 2 0 0 0 -4 0" /></svg>
        </div>
        <div class="flex flex-col">
          <span class="text-[0.65rem] font-bold uppercase tracking-widest text-slate-500">Conecta</span>
          <span class="text-[0.95rem] font-bold text-[#2d2a4a]">LinkedIn</span>
        </div>
      </a>

      <a
        class="group flex items-center gap-4 rounded-[1.8rem] border border-white/50 bg-white/40 px-6 py-5 no-underline transition-all duration-300 hover:-translate-y-1 hover:bg-white/60 hover:shadow-xl hover:shadow-midnight-orchid/10"
        [href]="contacts().github"
        rel="noreferrer"
        target="_blank"
        aria-label="Abrir perfil de GitHub en una nueva pestaña"
      >
        <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-midnight-orchid/10 text-midnight-orchid shadow-inner transition-transform group-hover:scale-110">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5" /></svg>
        </div>
        <div class="flex flex-col">
          <span class="text-[0.65rem] font-bold uppercase tracking-widest text-slate-500">Código</span>
          <span class="text-[0.95rem] font-bold text-[#2d2a4a]">GitHub</span>
        </div>
      </a>

    </div>
  </div>
</section>
