<section id="habilidades" class="rounded-2xl border border-[var(--color-border)] bg-[var(--color-surface)] px-6 py-5 sm:px-8 sm:py-7">
  <p class="mb-2 text-xs uppercase tracking-[0.08em] text-[var(--color-text-soft)]">
    Stack profesional
  </p>
  <h2 class="mb-4 font-[var(--font-heading)] text-[clamp(1.2rem,2.4vw,1.75rem)] text-[var(--color-text)]">
    Habilidades y herramientas
  </h2>

  <div class="grid gap-4 lg:grid-cols-3">
    @for (group of skills(); track group.title) {
      <article class="flex h-full flex-col rounded-2xl border border-white/20 bg-white/30 p-4 backdrop-blur-md shadow-xl shadow-[#342a4f]/10">
        <h3 class="mb-3 flex items-center gap-2 text-sm font-semibold uppercase tracking-[0.04em] text-[var(--color-accent-strong)]">
          @if (group.title.includes('Frontend')) {
            <span aria-hidden="true">🧩</span>
          } @else if (group.title.includes('Backend')) {
            <span aria-hidden="true">🛠</span>
          } @else {
            <span aria-hidden="true">🤝</span>
          }
          <span>{{ group.title }}</span>
        </h3>

        <div class="flex flex-wrap gap-2">
          @for (item of group.items; track item) {
            <span class="inline-flex items-center gap-1.5 rounded-full border border-white/20 bg-white/40 px-3 py-1 text-sm leading-tight text-[var(--color-text)] backdrop-blur-md">
              <span aria-hidden="true" class="text-[0.72rem]">✦</span>
              <span>{{ item }}</span>
            </span>
          }
        </div>
      </article>
    }
  </div>
</section>
