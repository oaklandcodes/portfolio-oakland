<section
  id="perfil"
  class="grid gap-6 rounded-[1.3rem] border border-[var(--color-border)] bg-[linear-gradient(155deg,var(--color-soft)_0%,var(--color-bg)_65%)] p-[clamp(1.2rem,4vw,2.6rem)] lg:grid-cols-[1.25fr_0.75fr] lg:items-center"
>
  <div>
    <p class="m-0 text-[0.78rem] uppercase tracking-[0.08em] text-[var(--color-text-soft)]">
      Frontend Developer | Angular
    </p>
    <h1 class="my-2.5 font-[var(--font-heading)] text-[clamp(2rem,7vw,3.7rem)] leading-none">
      {{ headline() }}
    </h1>
    <p class="m-0 text-[clamp(1rem,2.4vw,1.35rem)] text-[var(--color-accent-strong)]">
      {{ profile().role }}
    </p>
    <p class="mt-4 w-[min(66ch,100%)] text-[var(--color-text-soft)]">{{ profile().summary }}</p>

    <div class="mt-6 flex flex-wrap gap-3">
      <a
        class="rounded-full bg-[var(--color-accent)] px-4 py-2.5 font-semibold text-[var(--color-on-accent)] no-underline transition hover:bg-[var(--color-accent-strong)]"
        href="#contacto"
      >
        Hablemos
      </a>
      <a
        class="rounded-full border border-[var(--color-border-strong)] px-4 py-2.5 font-semibold text-[var(--color-text)] no-underline transition hover:bg-white/35"
        href="#proyectos"
      >
        Ver proyectos
      </a>
    </div>
  </div>

  <figure class="mx-auto h-[17rem] w-[17rem] overflow-hidden rounded-[2rem] border border-[var(--color-border)] lg:h-[20rem] lg:w-[20rem]">
    <img
      ngSrc="assets/hero-visual.avif"
      width="640"
      height="640"
      class="h-full w-full object-cover"
      alt="Elemento visual del portfolio"
      priority
    />
  </figure>
</section>
