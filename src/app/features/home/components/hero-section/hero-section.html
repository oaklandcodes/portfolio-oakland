<section
  id="perfil"
  class="grid gap-8 rounded-[1.3rem] border border-[var(--color-border)] bg-[linear-gradient(160deg,#ece8f0_0%,#dfd7e8_55%,#d7cddd_100%)] p-[clamp(1.2rem,4vw,2.5rem)] lg:grid-cols-[1.25fr_0.75fr] lg:items-center"
>
  <div>
    <span class="text-iris-mist text-sm font-semibold uppercase tracking-widest">
      {{ profile().greeting }}
    </span>

    <h1 class="text-midnight-orchid mt-2 text-[clamp(2.5rem,6vw,4.25rem)] font-black leading-[0.98]">
      {{ profile().name }}
    </h1>

    <h2 class="text-dusky-lilac mt-4 text-[clamp(1.35rem,2.8vw,2rem)] font-medium">
      {{ profile().role }}
    </h2>

    <p class="mt-6 max-w-2xl text-[clamp(1rem,1.7vw,1.2rem)] leading-relaxed text-slate-700">
      {{ profile().summary }}
    </p>

    <div class="mt-7 flex flex-wrap gap-2.5">
      <a
        href="#proyectos"
        class="bg-midnight-orchid rounded-full px-4 py-2 text-sm font-semibold text-white no-underline transition hover:bg-midnight-orchid/90"
      >
        Ver proyectos
      </a>
      <a
        href="assets/cv_Oakland_Frontend_Angular.pdf"
        download="cv_Oakland_Frontend_Angular.pdf"
        class="text-midnight-orchid border border-iris-mist rounded-full bg-white/55 px-4 py-2 text-sm font-semibold no-underline transition hover:bg-white/80"
      >
        Descargar CV
      </a>
      <a
        href="#contacto"
        class="text-midnight-orchid border border-iris-mist rounded-full bg-white/55 px-4 py-2 text-sm font-semibold no-underline transition hover:bg-white/80"
      >
        Contactar
      </a>
    </div>
  </div>

  <figure class="relative mx-auto w-full max-w-[22rem]">
    <div class="absolute -right-2 -top-2 h-12 w-12 rounded-full bg-white/55 blur-sm"></div>

    <div class="border-silver-wisteria shadow-midnight-orchid/10 overflow-hidden rounded-[1.6rem] border bg-white/50 p-2 shadow-xl">
      <img
        ngSrc="assets/foto-cv.jpg"
        width="640"
        height="640"
        class="h-[20rem] w-full rounded-[1.1rem] object-cover"
        alt="Foto de perfil profesional de Oakland Caro"
        priority
      />
    </div>

    <figcaption class="text-dusky-lilac mt-3 text-center text-xs uppercase tracking-[0.08em]">
      Curiosidad, disciplina y aprendizaje continuo
    </figcaption>
  </figure>
</section>
