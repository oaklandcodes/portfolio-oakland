<section id="experiencia" class="rounded-2xl border border-[var(--color-border)] bg-[var(--color-surface)] p-5 sm:p-7">
  <p class="mb-2 text-xs uppercase tracking-[0.08em] text-[var(--color-text-soft)]">
    Trayectoria
  </p>
  <h2 class="mb-4 font-[var(--font-heading)] text-[clamp(1.2rem,2.4vw,1.75rem)] text-[var(--color-text)]">
    Experiencia profesional
  </h2>

  <div class="border-iris-mist/35 relative grid gap-6 border-l-2 pl-6 sm:pl-8">
    @for (experience of experiences(); track experience.title + experience.company) {
      <article class="relative rounded-2xl border border-white/20 bg-white/30 p-4 sm:p-5 backdrop-blur-md shadow-xl shadow-[#342a4f]/10">
        <span class="border-silver-wisteria bg-dusky-lilac absolute -left-[1.95rem] top-5 h-3.5 w-3.5 rounded-full border-4"></span>
        <div class="grid gap-3 md:grid-cols-[1fr_auto] md:items-start">
          <div class="min-w-0">
            <h3 class="m-0 text-[1.02rem] font-black leading-tight text-[var(--color-accent-strong)]">
              {{ experience.title }}
            </h3>
            <p class="m-0 mt-1 text-sm font-medium leading-snug text-[var(--color-text)]">
              {{ experience.company }}
            </p>
          </div>

          <p class="m-0 inline-flex items-center justify-center rounded-full border border-white/20 bg-white/40 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-[var(--color-text-soft)] backdrop-blur-md md:min-w-[8.5rem]">
            {{ experience.period }}
          </p>
        </div>

        <ul class="mt-3 grid gap-2 pl-5 text-[0.96rem] leading-relaxed text-[var(--color-text-soft)]">
          @for (achievement of experience.description; track achievement) {
            <li class="marker:text-[var(--color-accent-strong)]">{{ achievement }}</li>
          }
        </ul>
      </article>
    }
  </div>
</section>
