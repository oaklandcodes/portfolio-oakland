<section id="experiencia" class="relative overflow-hidden rounded-[2.5rem] border border-white/40 bg-[linear-gradient(160deg,rgba(245,243,247,0.7)_0%,rgba(230,220,240,0.5)_100%)] p-[clamp(1.5rem,5vw,3rem)] backdrop-blur-sm shadow-xl">
  
  <div class="absolute -right-16 -top-16 h-56 w-56 rounded-full bg-midnight-orchid/5 blur-[100px]"></div>

  <div class="relative z-10">
    <p class="mb-2 text-[0.7rem] font-bold uppercase tracking-[0.3em] text-midnight-orchid opacity-80">
      Trayectoria
    </p>
    <h2 class="mb-10 font-[var(--font-heading)] text-[clamp(1.8rem,3vw,2.3rem)] font-black tracking-tight text-[#2d2a4a]">
      Experiencia profesional
    </h2>

    <div class="relative ml-3 grid gap-8 border-l-2 border-dashed border-midnight-orchid/20 pl-8 sm:ml-4 
                after:absolute after:-bottom-2 after:-left-[2px] after:h-32 after:w-[2px] 
                after:bg-gradient-to-b after:from-transparent after:to-[#e6dcf0] after:content-['']">
      
      @for (experience of experiences(); track experience.title + experience.company) {
        <article class="group relative rounded-[2rem] border border-white/50 bg-white/40 p-6 backdrop-blur-md shadow-lg transition-all duration-500 hover:-translate-y-1 hover:bg-white/70 hover:shadow-2xl hover:shadow-midnight-orchid/5">
          
          <span class="absolute -left-[2.55rem] top-8 h-4 w-4 rounded-full border-4 border-white bg-midnight-orchid shadow-[0_0_12px_rgba(109,40,217,0.3)] transition-all duration-500 group-hover:scale-125 group-hover:shadow-midnight-orchid/50"></span>

          <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
            <div class="min-w-0">
              <h3 class="m-0 text-[1.2rem] font-black leading-tight text-[#2d2a4a] group-hover:text-midnight-orchid transition-colors">
                {{ experience.title }}
              </h3>
              <p class="m-0 mt-1.5 flex items-center gap-2 text-sm font-bold text-slate-500">
                <span class="h-1 w-1 rounded-full bg-midnight-orchid/40"></span>
                {{ experience.company }}
              </p>
            </div>

            <div class="inline-flex shrink-0 items-center gap-2 justify-center rounded-xl border border-white/60 bg-white/50 px-4 py-2 text-[0.7rem] font-black uppercase tracking-widest text-midnight-orchid shadow-sm backdrop-blur-md md:min-w-[9.5rem] group-hover:bg-midnight-orchid group-hover:text-white transition-colors duration-300">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12z" /><path d="M16 3v4" /><path d="M8 3v4" /><path d="M4 11h16" /><path d="M11 15h1" /><path d="M12 15v3" /></svg>
              {{ experience.period }}
            </div>
          </div>

          <div class="mt-5">
            <ul class="grid gap-3">
              @for (achievement of experience.description; track achievement) {
                <li class="flex items-start gap-3 text-[0.92rem] leading-relaxed text-slate-600 font-medium">
                  <svg xmlns="http://www.w3.org/2000/svg" class="mt-1 h-4 w-4 shrink-0 text-midnight-orchid transition-transform group-hover:scale-110" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                  </svg>
                  <span>{{ achievement }}</span>
                </li>
              }
            </ul>
          </div>
        </article>
      }
    </div>
  </div>
</section>
