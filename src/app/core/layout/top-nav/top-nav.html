<header class="fixed top-6 left-0 right-0 z-50 flex justify-center px-4">
    <nav
        class="flex min-h-[3.8rem] w-full max-w-[900px] items-center justify-between gap-4 px-8
               rounded-full border border-white/30 bg-white/40 backdrop-blur-md 
               shadow-[0_10px_40px_-10px_rgba(0,0,0,0.15)] transition-all duration-500"
        aria-label="Navegación principal"
    >
        <a
            class="font-[var(--font-heading)] text-[1.1rem] font-extrabold tracking-tight text-[#2d2a4a] no-underline hover:opacity-70 transition"
            href="#top"
        >
            <span class="text-midnight-orchid">O</span>akland
        </a>

        <ul class="m-0 hidden list-none items-center gap-8 p-0 md:flex">
            @for (item of navItems(); track item.href) {
                <li>
                    <a
                        class="relative text-[0.8rem] font-bold uppercase tracking-widest text-[#2d2a4a]/70 no-underline transition-all duration-300 hover:text-midnight-orchid group"
                        [href]="item.href"
                    >
                        {{ item.label }}
                        <span class="absolute -bottom-1 left-1/2 h-[2px] w-0 -translate-x-1/2 bg-midnight-orchid transition-all duration-300 group-hover:w-full"></span>
                    </a>
                </li>
            }
        </ul>

        <a
            class="bg-[#2d2a4a] rounded-full px-6 py-2 text-[0.8rem] font-bold uppercase tracking-tighter text-white no-underline 
                   transition-all duration-300 hover:scale-105 hover:bg-midnight-orchid hover:shadow-[0_8px_20px_rgba(45,42,74,0.3)] active:scale-95"
            href="#contacto"
        >
            Contactar
        </a>
    </nav>
</header>
